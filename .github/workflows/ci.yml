name: LuminaCast CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Restore dependencies
      run: dotnet restore backend/LuminaCast.Backend.Tests/LuminaCast.Backend.Tests.csproj
      
    - name: Build Backend
      run: dotnet build backend/LuminaCast.Backend/LuminaCast.Backend.csproj --no-restore --configuration Release
      
    - name: Test Backend
      run: dotnet test backend/LuminaCast.Backend.Tests/LuminaCast.Backend.Tests.csproj --no-build --configuration Release --verbosity normal /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install dependencies
      run: npm ci
      working-directory: ./frontend
      
    - name: Build Next.js
      run: npm run build
      working-directory: ./frontend
      env:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_mock
        CLERK_SECRET_KEY: sk_test_mock
        NEXT_TELEMETRY_DISABLED: 1
